# AeroSpace config managed by hub
# Based on: https://nikitabobko.github.io/AeroSpace/guide#default-config

config-version = 2

# hub: launch sketchybar and jankyborders on startup
after-startup-command = [
    'exec-and-forget sketchybar',
    'exec-and-forget borders active_color=0xff00ff00 width=10.0 style=round',
]

# hub: start at login
start-at-login = true

# hub: update sketchybar workspace labels on focus change
exec-on-workspace-change = ['/bin/bash', '-c',
    '$HOME/.config/sketchybar/plugins/aerospace.sh']

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 30

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Also see: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = false

# Persistent workspaces
persistent-workspaces = ["1", "2", "3", "4", "5", "6", "7", "8", "9", "A", "B",
                         "C", "D", "E", "F", "G", "I", "M", "N", "O", "P", "Q",
                         "R", "S", "T", "U", "V", "W", "X", "Y", "Z"]

# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
on-mode-changed = ['exec-and-forget /bin/bash $HOME/.config/sketchybar/plugins/aerospace_mode.sh']

# hub: auto-arrange tiling whenever any new window is detected
[[on-window-detected]]
check-further-callbacks = true
run = ['exec-and-forget __HUB_SCRIPT__ arrange-open-window $AEROSPACE_FOCUSED_WORKSPACE_ID']

# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
    preset = 'qwerty'

# hub: 15px padding on all sides
[gaps]
    inner.horizontal = 15
    inner.vertical =   15
    outer.left =       15
    outer.bottom =     15
    outer.top =        50
    outer.right =      15

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.main.binding]

    # See: https://nikitabobko.github.io/AeroSpace/commands#layout
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'

    # See: https://nikitabobko.github.io/AeroSpace/commands#focus
    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move
    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#resize
    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'
    alt-8 = 'workspace 8'
    alt-9 = 'workspace 9'
    alt-a = 'workspace A'
    alt-b = 'workspace B'
    alt-c = 'workspace C'
    alt-d = 'workspace D'
    alt-e = 'workspace E'
    alt-f = 'workspace F'
    alt-g = 'workspace G'
    alt-i = 'workspace I'
    alt-m = 'workspace M'
    alt-n = 'workspace N'
    alt-o = 'workspace O'
    alt-p = 'workspace P'
    alt-q = 'workspace Q'
    alt-r = 'workspace R'
    alt-s = 'workspace S'
    alt-t = 'workspace T'
    alt-u = 'workspace U'
    alt-v = 'workspace V'
    alt-w = 'workspace W'
    alt-x = 'workspace X'
    alt-y = 'workspace Y'
    alt-z = 'workspace Z'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'
    alt-shift-6 = 'move-node-to-workspace 6'
    alt-shift-7 = 'move-node-to-workspace 7'
    alt-shift-8 = 'move-node-to-workspace 8'
    alt-shift-9 = 'move-node-to-workspace 9'
    alt-shift-a = 'move-node-to-workspace A'
    alt-shift-b = 'move-node-to-workspace B'
    alt-shift-c = 'move-node-to-workspace C'
    alt-shift-d = 'move-node-to-workspace D'
    alt-shift-e = 'move-node-to-workspace E'
    alt-shift-f = 'move-node-to-workspace F'
    alt-shift-g = 'move-node-to-workspace G'
    alt-shift-i = 'move-node-to-workspace I'
    alt-shift-m = 'move-node-to-workspace M'
    alt-shift-n = 'move-node-to-workspace N'
    alt-shift-o = 'move-node-to-workspace O'
    alt-shift-p = 'move-node-to-workspace P'
    alt-shift-q = 'move-node-to-workspace Q'
    alt-shift-r = 'move-node-to-workspace R'
    alt-shift-s = 'move-node-to-workspace S'
    alt-shift-t = 'move-node-to-workspace T'
    alt-shift-u = 'move-node-to-workspace U'
    alt-shift-v = 'move-node-to-workspace V'
    alt-shift-w = 'move-node-to-workspace W'
    alt-shift-x = 'move-node-to-workspace X'
    alt-shift-y = 'move-node-to-workspace Y'
    alt-shift-z = 'move-node-to-workspace Z'

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
    alt-tab = 'workspace-back-and-forth'
    # See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # See: https://nikitabobko.github.io/AeroSpace/commands#mode
    alt-shift-semicolon = 'mode service'

    # cycle through hub-registered workspaces only
    ctrl-alt-leftSquareBracket  = 'exec-and-forget __HUB_SCRIPT__ prev'
    ctrl-alt-rightSquareBracket = 'exec-and-forget __HUB_SCRIPT__ next'

    # hub: dashboard (status + keys)
    ctrl-alt-slash = 'exec-and-forget __HUB_SCRIPT__ dashboard'

    # hub: create new workspace
    ctrl-alt-n = 'exec-and-forget __HUB_SCRIPT__ new'

    # hub: remove current workspace
    ctrl-alt-d = 'exec-and-forget __HUB_SCRIPT__ remove'

    # hub: rename current workspace
    ctrl-alt-r = 'exec-and-forget __HUB_SCRIPT__ rename'

    # hub: open apps (smart: focus-or-launch). Shift = force new window.
    ctrl-alt-o = 'exec-and-forget __HUB_SCRIPT__ open'
    ctrl-alt-1 = 'exec-and-forget __HUB_SCRIPT__ open 1'
    ctrl-alt-2 = 'exec-and-forget __HUB_SCRIPT__ open 2'
    ctrl-alt-3 = 'exec-and-forget __HUB_SCRIPT__ open 3'
    ctrl-alt-4 = 'exec-and-forget __HUB_SCRIPT__ open 4'
    ctrl-alt-5 = 'exec-and-forget __HUB_SCRIPT__ open 5'
    # hub: shrink/grow workspace label length
    ctrl-alt-minus = 'exec-and-forget __HUB_SCRIPT__ label-length shrink'
    ctrl-alt-equal = 'exec-and-forget __HUB_SCRIPT__ label-length grow'
    ctrl-alt-shift-minus = 'exec-and-forget __HUB_SCRIPT__ label-length min'
    ctrl-alt-shift-equal = 'exec-and-forget __HUB_SCRIPT__ label-length max'
    # hub: toggle bar height (notch avoidance) / reload bar
    ctrl-alt-shift-b = 'exec-and-forget __HUB_SCRIPT__ bar-height toggle'
    ctrl-alt-b = 'exec-and-forget __HUB_SCRIPT__ bar-reload'
    # hub: toggle repo name prefix on workspace labels
    ctrl-alt-p = 'exec-and-forget __HUB_SCRIPT__ repo-prefix toggle'

    ctrl-alt-shift-1 = 'exec-and-forget __HUB_SCRIPT__ open 1 --force'
    ctrl-alt-shift-2 = 'exec-and-forget __HUB_SCRIPT__ open 2 --force'
    ctrl-alt-shift-3 = 'exec-and-forget __HUB_SCRIPT__ open 3 --force'
    ctrl-alt-shift-4 = 'exec-and-forget __HUB_SCRIPT__ open 4 --force'
    ctrl-alt-shift-5 = 'exec-and-forget __HUB_SCRIPT__ open 5 --force'

    alt-backtick = 'focus --boundaries workspace --boundaries-action wrap-around-the-workspace dfs-next'
    alt-shift-backtick = 'focus --boundaries workspace --boundaries-action wrap-around-the-workspace dfs-prev'
    alt-ctrl-esc = 'focus-back-and-forth'


# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main'] # reset layout
    f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
    backspace = ['close-all-windows-but-current', 'mode main']

    alt-shift-h = ['join-with left', 'mode main']
    alt-shift-j = ['join-with down', 'mode main']
    alt-shift-k = ['join-with up', 'mode main']
    alt-shift-l = ['join-with right', 'mode main']