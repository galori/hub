name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        run: brew install bats-core

      - name: Run tests (skip Swift compile)
        run: SKIP_SWIFT_COMPILE=1 bats test/
