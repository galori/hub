name: Live Integration Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: live-integration-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    runs-on: [self-hosted, macOS, hub-live-integration]
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Ensure dependencies
        run: |
          brew list bats-core >/dev/null 2>&1 || brew install bats-core
          brew list jq >/dev/null 2>&1 || brew install jq
          brew list --cask aerospace >/dev/null 2>&1 || brew install --cask nikitabobko/tap/aerospace
          brew list borders >/dev/null 2>&1 || brew install FelixKratz/formulae/borders

      - name: Run live integration tests
        id: integration
        shell: bash
        run: |
          set -o pipefail
          make test-integration 2>&1 | tee "$RUNNER_TEMP/live-integration.log"

      - name: Upload failure log
        if: failure() && steps.integration.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: live-integration-failure-log
          path: ${{ runner.temp }}/live-integration.log

      - name: Open repair issue
        if: github.event_name == 'push' && failure() && steps.integration.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const logPath = `${process.env.RUNNER_TEMP}/live-integration.log`;
            const log = fs.existsSync(logPath)
              ? fs.readFileSync(logPath, 'utf8')
              : 'No live integration log was captured.';
            const tail = log.slice(-12000);
            const title = 'Live integration failure on main';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'The post-merge live integration suite failed on `main`.',
              '',
              `Commit: ${context.sha}`,
              `Workflow run: ${runUrl}`,
              '',
              'Repair automation should create a branch from current `main`, diagnose the failure, and open a PR. Do not push directly to `main`.',
              '',
              '<details>',
              '<summary>Failure log tail</summary>',
              '',
              '```text',
              tail,
              '```',
              '</details>'
            ].join('\n');

            const { data: issues } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "${title}"`
            });

            if (issues.total_count > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.items[0].number,
                body
              });
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });
